version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - echo "PTV_API_KEY=$(aws ssm get-parameter --name /melbournemove/ptv-api-key --with-decryption --query Parameter.Value --output text)" >> .env.production
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
